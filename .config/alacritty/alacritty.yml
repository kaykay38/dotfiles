# yamllint disable rule:braces rule:commas rule:colons rule:comments-indentation

window:
    # Blank space added around the window in pixels
    padding:
        x: 10
        y: 10
    # Spread additional padding evenly around the terminal content
    dynamic_padding: true

background_opacity: 0.95  # value range is 0 ~ 1

font:
    normal:
        family: FuraMono Nerd Font
        style: Regular
    bold:
        family: FuraMono Nerd Font
        style: Bold
    italic:
        family: MesloLGM Nerd Font
        style: Italic
    # Point size of the font
    size: 11.5

# Gruvbox
colors:
  primary:
    # hard contrast: background: '#1d2021'
    # medium contrast: background: '#282828'
    # soft contrast: background: '#32302f'
    background: '#242424'
    foreground: '#ebdbb2'
    cursor:
        text: '#242424'   # black
        cursor: '#d1871f'
    # Normal colors
    normal:
        black: '#282828'
        red: '#cc241d'
        green: '#98971a'
        yellow: '#d79921'
        blue: '#458588'
        magenta: '#b16286'
        cyan: '#689d6a'
        white: '#a89984'
    # Bright colors
    bright:
        black: '#928374'
        red: '#fb4934'
        green: '#b8bb26'
        yellow: '#fabd2f'
        blue: '#83a598'
        magenta: '#d3869b'
        cyan: '#8ec07c'
        white: '#ebdbb2'

mouse:
    hide_when_typing: true
    url:
        # These are the modifiers that need to be held down for opening URLs
        # when clicking
        modifiers: Shift

selection:
    # When set to `true`, selected text will be copied to the primary
    # clipboard.
    save_to_clipboard: false

cursor:
    # Thickness of the cursor (number from `0.0` to `1.0`)
    thickness: 0.18
    # Vim mode cursor style
    vi_mode_style: Block
